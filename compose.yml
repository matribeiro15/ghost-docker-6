# documentation: https://ghost.org
# slogan: Ghost is a content management system (CMS) and blogging platform.
# category: cms
# tags: cms, blog, content, management, system
# logo: svgs/ghost.svg
# port: 2368

services:
  ghost:
    image: ghost:6-alpine
    restart: always
    volumes:
      - ./ghost-content:/var/lib/ghost/content
    environment:
      - url=https://${SERVICE_FQDN_GHOST}
      # Database configuration
      - database__client=mysql
      - database__connection__host=mysql
      - database__connection__user=${SERVICE_USER_MYSQL:-ghost}
      - database__connection__password=$SERVICE_PASSWORD_MYSQL
      - database__connection__database=${MYSQL_DATABASE:-ghost}
      # Mail configuration
      - mail__transport=SMTP
      - mail__options__auth__user=${MAIL_OPTIONS_AUTH_USER}
      - mail__options__auth__pass=${MAIL_OPTIONS_AUTH_PASS}
      - mail__options__secure=${MAIL_OPTIONS_SECURE:-true}
      - mail__options__port=${MAIL_OPTIONS_PORT:-465}
      - mail__options__service=${MAIL_OPTIONS_SERVICE:-Mailgun}
      - mail__options__host=${MAIL_OPTIONS_HOST}
      - mail__from=${MAIL_FROM}
      #Tinybird configuration
      - tinybird__tracker__endpoint=https://${SERVICE_FQDN_GHOST}/.ghost/analytics/api/v1/page_hit
      - tinybird__adminToken=${TINYBIRD_ADMIN_TOKEN:-}
      - tinybird__workspaceId=${TINYBIRD_WORKSPACE_ID:-}
      - tinybird__tracker__datasource=analytics_events
      - tinybird__stats__endpoint=${TINYBIRD_API_URL:-https://api.tinybird.co}
      # ActivityPub configuration
      - ACTIVITYPUB_TARGET=https://ap.ghost.org
    depends_on:
      mysql:
        condition: service_healthy
      tinybird-sync:
        condition: service_completed_successfully
        required: false
      tinybird-deploy:
        condition: service_completed_successfully
        required: false
      activitypub:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 5s
      timeout: 20s
      retries: 10
 
    labels:
      - traefik.enable=true
      - 'traefik.http.services.ghost-activitypub.loadbalancer.server.url=https://ap.ghost.org'
      - traefik.http.services.ghost-activitypub.loadbalancer.passhostheader=true
      - 'traefik.http.routers.ghost-activitypub.rule=Host(`$SERVICE_FQDN_GHOST`) && PathPrefix(`/.ghost/activitypub/`)'
      - traefik.http.routers.ghost-activitypub.entrypoints=https
      - traefik.http.routers.ghost-activitypub.tls=true
      - traefik.http.routers.ghost-activitypub.priority=1000
      - traefik.http.routers.ghost-activitypub.service=ghost-activitypub
      - 'traefik.http.routers.ghost-webfinger.rule=Host(`$SERVICE_FQDN_GHOST`) && PathPrefix(`/.well-known/webfinger`)'
      - traefik.http.routers.ghost-webfinger.entrypoints=https
      - traefik.http.routers.ghost-webfinger.tls=true
      - traefik.http.routers.ghost-webfinger.priority=1000
      - traefik.http.routers.ghost-webfinger.service=ghost-activitypub
      - 'traefik.http.routers.ghost-nodeinfo.rule=Host(`$SERVICE_FQDN_GHOST`) && PathPrefix(`/.well-known/nodeinfo`)'
      - traefik.http.routers.ghost-nodeinfo.entrypoints=https
      - traefik.http.routers.ghost-nodeinfo.tls=true
      - traefik.http.routers.ghost-nodeinfo.priority=1000
      - traefik.http.routers.ghost-nodeinfo.service=ghost-activitypub

  mysql:
    image: mysql:8.0.44
    restart: unless-stopped
    volumes:
      - ghost-mysql:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_USER=${SERVICE_USER_MYSQL}
      - MYSQL_PASSWORD=${SERVICE_PASSWORD_MYSQL}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${SERVICE_PASSWORD_MYSQLROOT}
      - MYSQL_MULTIPLE_DATABASES=activitypub
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 20s
      retries: 10

  traffic-analytics:
    image: ghost/traffic-analytics:1.0.268@sha256:dbc1f3ba4854c9954c13059e2be61668fc99a4494bdc3d9737c239f742e07e83
    restart: always
    expose:
      - "3000"
    volumes:
      - traffic_analytics_data:/data
    environment:
      - PROXY_TARGET=${TINYBIRD_API_URL:-https://api.tinybird.co}/v0/events
      - SALT_STORE_TYPE=${SALT_STORE_TYPE:-file}
      - SALT_STORE_FILE_PATH=/data/salts.json
      - TINYBIRD_TRACKER_TOKEN=${TINYBIRD_TRACKER_TOKEN:-}
      - LOG_LEVEL=debug
    profiles: [analytics]

  activitypub:
    image: ghcr.io/tryghost/activitypub:1.2.6@sha256:0127dea9be75d0ed9c6f8f3909aa5e1f69cc3e1f22d718a49aad28ffdc8b5367
    restart: always
    expose:
      - "8080"
    volumes:
      - ./ghost-content:/opt/activitypub/content
    environment:
      # See https://github.com/TryGhost/ActivityPub/blob/main/docs/env-vars.md
      - MYSQL_HOST=mysql
      - MYSQL_USER=${SERVICE_USER_MYSQL:-ghost}
      - MYSQL_PASSWORD=$SERVICE_PASSWORD_MYSQL
      - MYSQL_DATABASE=activitypub
      - LOCAL_STORAGE_PATH=/opt/activitypub/content/images/activitypub
      - LOCAL_STORAGE_HOSTING_URL=https://${SERVICE_FQDN_GHOST}/content/images/activitypub
    depends_on:
      mysql:
        condition: service_healthy
      activitypub-migrate:
        condition: service_completed_successfully
    profiles: [activitypub]

  tinybird-login:
    build:
      context: ./tinybird
      dockerfile: Dockerfile
    working_dir: /home/tinybird
    command: /usr/local/bin/tinybird-login
    volumes:
      - tinybird_home:/home/tinybird
      - tinybird_files:/data/tinybird
    profiles: [analytics]
    tty: false
    restart: no

  tinybird-sync:
    # Do not alter this without updating the Ghost container as well
    image: ghost:${GHOST_VERSION:-6-alpine}
    command: >
      sh -c "
        if [ -d /var/lib/ghost/current/core/server/data/tinybird ]; then
          rm -rf /data/tinybird/*;
          cp -rf /var/lib/ghost/current/core/server/data/tinybird/* /data/tinybird/;
          echo 'Tinybird files synced into shared volume.';
        else
          echo 'Tinybird source directory not found.';
        fi
      "
    volumes:
      - tinybird_files:/data/tinybird
    depends_on:
      tinybird-login:
        condition: service_completed_successfully
    profiles: [analytics]
    restart: no

  tinybird-deploy:
    build:
      context: ./tinybird
      dockerfile: Dockerfile
    working_dir: /data/tinybird
    command: >
      sh -c "
        tb-wrapper --cloud deploy
      "
    volumes:
      - tinybird_home:/home/tinybird
      - tinybird_files:/data/tinybird
    depends_on:
      tinybird-sync:
        condition: service_completed_successfully
    profiles: [analytics]
    tty: true

  activitypub-migrate:
    image: ghcr.io/tryghost/activitypub-migrations:1.2.6@sha256:ba832dc6f6ea77ca84ee3d0308b38bdf135710f92a93d9ffbb4662c297a62e18
    environment:
      MYSQL_DB: mysql://${SERVICE_USER_MYSQL:-ghost}:$SERVICE_PASSWORD_MYSQL@tcp(mysql:3306)/activitypub
    depends_on:
      mysql:
        condition: service_healthy
    profiles: [activitypub]
    restart: no


volumes:
  ghost-mysql:
  traffic_analytics_data:
  tinybird_home:
  tinybird_files:
